# SWUpdate kconfig fragment for Torizon OS A/B (merged onto the base defconfig).
#
# We do NOT use SWUpdate's own bootloader interface: the aktualizr action
# handler (swupdate_actions.sh) flips the GRUB environment directly via
# grub-editenv, and the sw-description has no "bootenv" section. So select
# BOOTLOADER_NONE. This avoids the default CONFIG_UBOOT=y, which makes SWUpdate
# depend on libubootenv -> u-boot-default-env, which is unbuildable on x86
# (no U-Boot).
CONFIG_UBOOT=n
CONFIG_BOOTLOADER_EBG=n
CONFIG_BOOTLOADER_GRUB=n
CONFIG_BOOTLOADER_NONE=y

# Raw write of the ext4 slot + gzip/zstd payload decompression.
CONFIG_RAW=y
CONFIG_GUNZIP=y
CONFIG_ZSTD=y

# Signed .swu verification (optional; enable and provide keys if you sign).
# CONFIG_SIGNED_IMAGES=y

# SWUpdate kconfig fragment for Torizon OS A/B (merged onto the base defconfig).
#
# We do NOT use SWUpdate's own bootloader interface: the aktualizr action
# handler (swupdate_actions.sh) flips the GRUB environment directly via
# grub-editenv, and the sw-description has no "bootenv" section. So select
# BOOTLOADER_NONE. This avoids the default CONFIG_UBOOT=y, which makes SWUpdate
# depend on libubootenv -> u-boot-default-env, which is unbuildable on x86
# (no U-Boot).
CONFIG_UBOOT=n
CONFIG_BOOTLOADER_EBG=n
CONFIG_BOOTLOADER_GRUB=n
CONFIG_BOOTLOADER_NONE=y

# Raw write of the ext4 slot + gzip/zstd payload decompression.
CONFIG_RAW=y
CONFIG_GUNZIP=y
CONFIG_ZSTD=y

# No per-image hash verification in SWUpdate: aktualizr already Uptane-verifies
# the entire .swu against signed metadata before SWUpdate opens it, so the
# ext4.gz is implicitly verified. Our sw-description therefore supplies no
# sha256 (avoids both "hash supplied but verification not enabled" and the
# compressed-vs-decompressed hash ambiguity for installed-directly images).
CONFIG_HASH_VERIFY=n

# We don't use SWUpdate's hardware-compatibility gate: aktualizr already targets
# the right device via Uptane hardware IDs, and our sw-description carries no
# hardware-compatibility list. Leaving it on makes SWUpdate reject the image
# ("HW compatibility not found").
CONFIG_HW_COMPATIBILITY=n

# Signed .swu verification (optional; enable and provide keys if you sign).
# CONFIG_SIGNED_IMAGES=y

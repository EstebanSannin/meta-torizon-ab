# SWUpdate kconfig fragment for Torizon OS A/B.
# Merged on top of the base defconfig by the kconfig build.
#
# REVIEW: verify option names against the SWUpdate version in your
# meta-swupdate (scarthgap). These are the commonly-used ones.

# Bootloader environment: GRUB (shared grubenv with the device).
CONFIG_BOOTLOADER_EBG=n
CONFIG_UBOOT=n
CONFIG_BOOTLOADER_GRUB=y

# Handlers needed to raw-write the rootfs ext4 image to a slot partition.
CONFIG_RAW=y
CONFIG_HANDLER_IN_FLASH=y

# Compression of the payload image.
CONFIG_GUNZIP=y
CONFIG_ZSTD=y

# Signed .swu verification (recommended in addition to aktualizr's Uptane sig).
# REVIEW: enable and provide keys if you sign the .swu.
# CONFIG_SIGNED_IMAGES=y

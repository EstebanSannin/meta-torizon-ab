# Torizon OS - A/B + SWUpdate variant (no OSTree)
#
# Reuses the Torizon common distro foundation (tune, systemd, users, aktualizr
# fork, versioning) but deliberately does NOT require sota.conf.inc, so:
#   - the "sota" DISTRO_FEATURE is NOT set
#   - sota.bbclass is NOT inherited
#   - the OSTree image classes / ostree packages / ota-ext4 fstypes are NOT forced
#
# We then explicitly re-add the update stack we want (aktualizr-torizon, rac,
# tzn-mqtt, auto-provisioning) in the image recipe, and add SWUpdate.

require conf/distro/include/common-torizon.inc

DISTRO = "torizon-ab"
DISTRO_NAME = "Torizon OS (A/B + SWUpdate, no OSTree)"

# Distro-specific override so recipes can use ':torizon-ab'
DISTROOVERRIDES .= ":torizon-ab"

# ---------------------------------------------------------------------------
# Remove every OSTree/TEZI image-assembly class that common-torizon.inc and
# base-distro.inc pull in. Without the 'sota' feature most of these never
# activate, but we drop them explicitly to keep parsing clean and the image
# pipeline plain (a normal wic + ext4 rootfs).
# ---------------------------------------------------------------------------
IMAGE_CLASSES:remove = "image_type_common_torizon image_type_torizon image_types_ostree image_types_ota image_repo_manifest"

# base-distro.inc points this at the OSTree initramfs; use our plain one.
# Bundle the initramfs INTO the kernel image so each rootfs slot carries a
# single self-contained /boot/<kernel> (GRUB then needs no separate initrd line
# and a slot can never boot with a mismatched initramfs).
INITRAMFS_IMAGE = "initramfs-torizon-ab-image"
INITRAMFS_IMAGE_BUNDLE = "1"
INITRAMFS_FSTYPES = "cpio.gz"

# ---------------------------------------------------------------------------
# Filesystem model.
#
# The OSTree 'stateless-system' feature (transient /etc via nss-altfiles) is
# meaningless for a plain A/B ext4 rootfs, so drop it. Persistent state lives
# on the dedicated data partition (mounted over /var), the rootfs slot itself
# is treated as reset-on-update.
# ---------------------------------------------------------------------------
DISTRO_FEATURES:remove = "stateless-system"

# Enable SWUpdate tooling.
DISTRO_FEATURES:append = " swupdate"

# ---------------------------------------------------------------------------
# x86 / GRUB image output. The A/B WKS lives in this layer's wic/ dir.
# ---------------------------------------------------------------------------
WKS_FILE = "torizon-ab-x86.wks"
IMAGE_FSTYPES = "wic wic.bmap ext4"

# The rootfs ext4 (per-slot payload) must carry a stable filesystem label so
# GRUB and the action handler can find/select it. The image recipe writes the
# label; slot A is the factory-flashed default.
TORIZON_AB_ROOTLABEL_A ?= "otaroot_a"
TORIZON_AB_ROOTLABEL_B ?= "otaroot_b"
TORIZON_AB_DATALABEL   ?= "data"
TORIZON_AB_BOOTLABEL   ?= "efi"

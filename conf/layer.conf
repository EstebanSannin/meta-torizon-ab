# Layer configuration for meta-torizon-ab
#
# meta-torizon-ab: a Torizon OS variant WITHOUT OSTree, using a classic
# A/B dual-partition scheme updated by SWUpdate, while keeping the Torizon
# update stack (aktualizr as a download+verify-only "primary", RAC, tzn-mqtt,
# auto-provisioning) and the rest of the Torizon default packages.
#
# The OS rootfs update is delivered through aktualizr's "generic secondary"
# (a.k.a. Subsystem Update) mechanism: the rootfs .swu rides a secondary whose
# action handler (swupdate_actions.sh) invokes SWUpdate against the inactive
# A/B slot and flips the GRUB environment.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes*/*/*.bb ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-torizon-ab"
BBFILE_PATTERN_meta-torizon-ab := "^${LAYERDIR}/"
# Higher than meta-toradex-torizon (90) so our overrides/bbappends take precedence.
BBFILE_PRIORITY_meta-torizon-ab = "91"

LAYERDEPENDS_meta-torizon-ab = "meta-toradex-torizon swupdate"
LAYERSERIES_COMPAT_meta-torizon-ab = "scarthgap"

# Make the A/B WKS files discoverable by wic.
WKS_SEARCH_PATH:append = ":${LAYERDIR}/wic"
